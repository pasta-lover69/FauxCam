<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FauxCam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0d1b2e;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 0 0 16px;
    }

    /* Header */
    .header {
      background: #0a1628;
      border-bottom: 1px solid #1e3a5f;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }
    .header-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-family: monospace;
      letter-spacing: 0.06em;
    }
    .header-badge.active { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .header-badge.inactive { background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.3); }

    .section { padding: 14px 16px 0; }
    .label {
      font-size: 10px;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: monospace;
      margin-bottom: 8px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .toggle-desc { font-size: 12px; color: #94a3b8; }
    .toggle-switch {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #1e3a5f;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #475569;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: rgba(245,158,11,0.3); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); background: #f59e0b; }

    /* Drop zone */
    #drop-zone {
      border: 1.5px dashed #1e3a5f;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(15,23,42,0.5);
    }
    #drop-zone:hover { border-color: #f59e0b; background: rgba(245,158,11,0.04); }
    #drop-zone.drag-over { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
    .drop-icon { font-size: 24px; margin-bottom: 6px; }
    .drop-text { font-size: 12px; color: #64748b; }
    .drop-text span { color: #f59e0b; }

    /* Preview */
    #preview-container { display: none; position: relative; border-radius: 10px; overflow: hidden; }
    #preview-img { width: 100%; display: block; border-radius: 10px; border: 1px solid #1e3a5f; }
    #remove-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(10,22,40,0.85);
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    #remove-btn:hover { color: #ef4444; border-color: #ef4444; }

    /* Status */
    #status-msg {
      margin-top: 10px;
      font-size: 11px;
      color: #10b981;
      font-family: monospace;
      letter-spacing: 0.04em;
      min-height: 16px;
    }
    #status-msg.error { color: #ef4444; }

    /* Info box */
    .info-box {
      margin: 14px 16px 0;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #92400e;
      color: #fbbf24;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">FauxCam</span>
    <span id="status-badge" class="header-badge inactive">OFF</span>
  </div>

  <div class="section">
    <p class="label">FauxCam</p>
    <div class="toggle-row">
      <span class="toggle-desc">Replace camera with uploaded image</span>
      <label class="toggle-switch">
        <input type="checkbox" id="enabled-toggle" />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="section" style="margin-top: 14px;">
    <p class="label">ID Image</p>

    <div id="drop-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none" />
      <div class="drop-icon">🪪</div>
      <p class="drop-text">Drop image or <span>browse</span></p>
      <p class="drop-text" style="margin-top:4px; font-size:11px;">JPG · PNG · WEBP</p>
    </div>

    <div id="preview-container">
      <img id="preview-img" alt="ID preview" />
      <button id="remove-btn">✕ Remove</button>
    </div>

    <div id="status-msg"></div>
  </div>

  <div class="info-box">
    ⚡ Reload the target tab after enabling for the override to take effect.
  </div>

  <script src="popup.js"></script>
</body>
</html>
